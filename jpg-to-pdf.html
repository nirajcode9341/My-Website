<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>JPG to PDF</title>


    <!-- jsPDF CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <link rel="stylesheet" href="jpg-to-pdf.css">
</head>

<body>

    <div class="box">

        <h2>JPG to PDF Converter</h2>

        <!-- DRAG & DROP AREA -->
        <div id="drop-area">
            <p>Drag & Drop Images Here or Click</p>
            <input type="file" id="imageInput" multiple accept="image/*">
        </div>

        <button onclick="convertToPDF()">Convert to PDF</button>

        <div id="preview"></div>

    </div>

    <script>
        let selectedFiles = [];

        const input = document.getElementById("imageInput");
        const dropArea = document.getElementById("drop-area");
        const preview = document.getElementById("preview");

        /* CLICK TO OPEN FILE */
        dropArea.addEventListener("click", () => input.click());

        /* FILE SELECT */
        input.addEventListener("change", (e) => {
            handleFiles(e.target.files);
        });

        /* DRAG EVENTS */
        dropArea.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropArea.style.background = "#fff7ed";
        });

        dropArea.addEventListener("dragleave", () => {
            dropArea.style.background = "transparent";
        });

        dropArea.addEventListener("drop", (e) => {
            e.preventDefault();
            dropArea.style.background = "transparent";
            handleFiles(e.dataTransfer.files);
        });

        /* HANDLE FILES */
        function handleFiles(files) {
            for (let file of files) {
                selectedFiles.push(file);
            }
            showPreview();
        }

        /* SHOW PREVIEW */
        function showPreview() {
            preview.innerHTML = "";

            selectedFiles.forEach((file, index) => {
                const reader = new FileReader();

                reader.onload = function (e) {
                    const div = document.createElement("div");
                    div.classList.add("preview-item");

                    const img = document.createElement("img");
                    img.src = e.target.result;

                    const btn = document.createElement("span");
                    btn.innerText = "X";
                    btn.classList.add("remove-btn");

                    btn.onclick = () => {
                        selectedFiles.splice(index, 1);
                        showPreview();
                    };

                    div.appendChild(img);
                    div.appendChild(btn);
                    preview.appendChild(div);
                };

                reader.readAsDataURL(file);
            });
        }

        /* CONVERT TO PDF */
        async function convertToPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF();

            if (selectedFiles.length === 0) {
                alert("Please select images!");
                return;
            }

            for (let i = 0; i < selectedFiles.length; i++) {
                const imgData = await fileToDataURL(selectedFiles[i]);

                if (i > 0) pdf.addPage();

                pdf.addImage(imgData, 'JPEG', 10, 10, 180, 160);
            }

            pdf.save("converted.pdf");
        }

        /* HELPER */
        function fileToDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>

</html>
